<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ホーム - ゆたキプ</title>
  <link rel="icon" href="yutakip.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html" class="active">ホーム</a></li>
      <li><a href="about.html">メンバー</a></li>
      <li><a href="works.html">活動内容</a></li>
      <li><a href="contact.html">お問い合わせ</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero">
      <span class="hero-label">ゆったりキプフェル眺める会</span>
      <h1>ゆたキプへ<br><span class="accent">ようこそ</span></h1>
      <p class="hero-desc">創作・発信活動を行うグループ「ゆたキプ」の公式サイトです。メンバーたちの作品や活動をご覧ください。</p>
    </section>

    <section>
      <h2>ギャラリー</h2>
      <div class="gallery">
        <img src="example1.jpg" alt="作品1" class="member">
        <img src="example2.jpg" alt="作品2" class="member">
        <img src="example3.jpg" alt="作品3" class="member">
      </div>
    </section>
  </main>

  <footer>
    &copy; ゆったりキプフェル眺める会
  </footer>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('fade-in');
    });
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        const url = new URL(this.href);
        if (url.origin === window.location.origin && url.pathname !== window.location.pathname) {
          e.preventDefault();
          document.body.style.transition = 'opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1)'; document.body.style.opacity = 0;
          setTimeout(() => { window.location = this.href; }, 700);
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お問い合わせ - ゆたキプ</title>
  <link rel="icon" href="yutakip.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Zen+Kurenaido&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">ホーム</a></li>
      <li><a href="about.html">メンバー</a></li>
      <li><a href="works.html">活動内容</a></li>
      <li><a href="contact.html" class="active">お問い合わせ</a></li>
    </ul>
  </nav>

  <main>
    <section>
      <span class="hero-label">Contact</span>
      <h1>お問い<span class="accent">合わせ</span></h1>
      <p class="lead">ご質問・ご要望などはこちらからご連絡ください。</p>
    </section>

    <section>
      <form style="margin-top: 1rem;" onsubmit="return false;">
        <div class="form-group">
          <label for="name">お名前</label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" />
        </div>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" />
        </div>
        <div class="form-group">
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="message" placeholder="ご質問・ご要望をご記入ください"></textarea>
        </div>
        <button type="submit">送信する</button>
      </form>
    </section>
  </main>

  <footer>
    &copy; ゆったりキプフェル眺める会
  </footer>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('fade-in');
    });
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        const url = new URL(this.href);
        if (url.origin === window.location.origin && url.pathname !== window.location.pathname) {
          e.preventDefault();
          document.body.style.transition = 'opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1)'; document.body.style.opacity = 0;
          setTimeout(() => { window.location = this.href; }, 700);
        }
      });
    });
  </script>
</body>
</html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>メンバー - ゆたキプ</title>
  <link rel="icon" href="yutakip.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Zen+Kurenaido&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .member-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    body.fade-in .member-card { opacity: 1; transform: translateY(0); }
    .member-card:nth-child(1) { transition-delay: 0.25s; }
    .member-card:nth-child(2) { transition-delay: 0.32s; }
    .member-card:nth-child(3) { transition-delay: 0.39s; }
    .member-card:nth-child(4) { transition-delay: 0.46s; }
    .member-card:nth-child(5) { transition-delay: 0.53s; }
    .member-card:nth-child(6) { transition-delay: 0.60s; }
    .member-card:nth-child(7) { transition-delay: 0.67s; }
    .member-card:nth-child(8) { transition-delay: 0.74s; }
    .member-card:hover {
      border-color: rgba(176, 125, 58, 0.35);
      box-shadow: 0 0 32px rgba(176, 125, 58, 0.1);
    }
    .member-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(176, 125, 58, 0.08);
      border: 1px solid rgba(176, 125, 58, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--accent);
      font-weight: 700;
      font-family: 'Shippori Mincho', serif;
      flex-shrink: 0;
    }
    .member-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .member-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .member-status {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .member-bio {
      font-size: 0.875rem;
      color: #9a8e82;
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-top: 2rem;
    }
    @media (max-width: 640px) {
      .members-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

        const url = new URL(this.href);
        if (url.origin === window.location.origin && url.pathname !== window.location.pathname) {
          e.preventDefault();
          document.body.style.transition = 'opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1)'; document.body.style.opacity = 0;

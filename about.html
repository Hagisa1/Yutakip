<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>メンバー - ゆたキプ</title>
<link rel="icon" href="yutakip.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Zen+Kurenaido&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
  .member-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  body.fade-in .member-card { opacity: 1; transform: translateY(0); }
  .member-card:nth-child(1) { transition-delay: 0.25s; }
  .member-card:nth-child(2) { transition-delay: 0.32s; }
  .member-card:nth-child(3) { transition-delay: 0.39s; }
  .member-card:nth-child(4) { transition-delay: 0.46s; }
  .member-card:nth-child(5) { transition-delay: 0.53s; }
  .member-card:nth-child(6) { transition-delay: 0.60s; }
  .member-card:nth-child(7) { transition-delay: 0.67s; }
  .member-card:nth-child(8) { transition-delay: 0.74s; }

  .member-card:hover {
    border-color: rgba(176, 125, 58, 0.35);
    box-shadow: 0 0 32px rgba(176, 125, 58, 0.1);
  }

  .member-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(176, 125, 58, 0.08);
    border: 1px solid rgba(176, 125, 58, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    color: var(--accent);
    font-weight: 700;
    font-family: 'Zen Kurenaido', serif;
    flex-shrink: 0;
  }

  .member-header {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .member-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .member-status {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }

  .member-bio {
    font-size: 0.875rem;
    color: #9a8e82;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }

  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
    margin-top: 2rem;
  }

  @media (max-width: 640px) {
    .members-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <ul>
    <li class="nav-logo"><a href="index.html"><img src="yutakip_logo.png" alt="ゆたキプ" /></a></li>
    <li><a href="index.html">ホーム</a></li>
    <li><a href="about.html" class="active">メンバー</a></li>
    <li><a href="works.html">活動内容</a></li>
    <li><a href="contact.html">お問い合わせ</a></li>
  </ul>
</nav>

<main>
  <section class="page-header">
    <h1>メンバー</h1>
    <p>ゆたキプのメンバーを紹介します。</p>
  </section>

  <div class="members-grid">

    <div class="member-card">
      <div class="member-header">
        <div class="member-avatar">ゆ</div>
        <div>
          <div class="member-name">メンバー1</div>
          <div class="member-status">リーダー</div>
        </div>
      </div>
      <div class="member-bio">自己紹介文をここに入力してください。</div>
    </div>

    <div class="member-card">
      <div class="member-header">
        <div class="member-avatar">た</div>
        <div>
          <div class="member-name">メンバー2</div>
          <div class="member-status">メンバー</div>
        </div>
      </div>
      <div class="member-bio">自己紹介文をここに入力してください。</div>
    </div>

    <div class="member-card">
      <div class="member-header">
        <div class="member-avatar">キ</div>
        <div>
          <div class="member-name">メンバー3</div>
          <div class="member-status">メンバー</div>
        </div>
      </div>
      <div class="member-bio">自己紹介文をここに入力してください。</div>
    </div>

    <div class="member-card">
      <div class="member-header">
        <div class="member-avatar">プ</div>
        <div>
          <div class="member-name">メンバー4</div>
          <div class="member-status">メンバー</div>
        </div>
      </div>
      <div class="member-bio">自己紹介文をここに入力してください。</div>
    </div>

  </div>
</main>

<script>
  window.addEventListener('load', () => {
    document.body.classList.add('fade-in');
  });
</script>

</body>
</html>
